spring.application.name=demo-login-system

# this file contains secrets, tokens, custom config etc.
spring.config.import=file:env.properties

# SERVER CONFIG
server.port=${SERVER_PORT}
# server local domain: something like http://localhost:3001
server.local-domain=${SERVER_LOCAL_DOMAIN}

# DB CONFIG
spring.datasource.url=jdbc:postgresql://localhost:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver=org.postgresql.Driver

# HIBERNATE
spring.jpa.hibernate.ddl-auto=update

# Json Web Token
jwt.secret=${JWT_SECRET}