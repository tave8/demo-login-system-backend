# In which environment is this server running
# Possible values: "LOCAL" | "PREVIEW" | "PRODUCTION"
whereami=${WHEREAMI}

# Spring framework 
spring.application.name=demo-login-system
spring.jackson.time-zone=UTC
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
spring.mvc.favicon.enabled=false

# Forgot password time-based security mechanism. 
# Possible values: "true" | "false"
# Can be therefore disabled, for development purposes 
forgotpassword.time-constraint.enabled=${FORGOT_PASSWORD_TIME_CONSTRAINT_ENABLED}

# Web server
server.url=${SERVER_URL}
server.port=${SERVER_PORT}

# Database
spring.datasource.url=${JDBC_DATABASE_URL}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate ORM
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Json Web Token
jwt.secret=${JWT_SECRET}

# Frontend URLs
frontend.production.url=${FRONTEND_PRODUCTION_URL}
frontend.preview.url=${FRONTEND_PREVIEW_URL}
frontend.preview.url-pattern=${FRONTEND_PREVIEW_URL_PATTERN}
frontend.local.url=${FRONTEND_LOCAL_URL}

# Email sending
email.sender-domain=${EMAIL_SENDER_DOMAIN}
email.sender-user=${EMAIL_SENDER_USER}
email.sender-name=${EMAIL_SENDER_NAME}

# Cloudinary API (file upload)
cloudinary.name=${CLOUDINARY_NAME}
cloudinary.apikey=${CLOUDINARY_API_KEY}
cloudinary.secret=${CLOUDINARY_API_SECRET}

# Resend API (send email)
resend.apikey=${RESEND_API_KEY}